<!DOCTYPE html>
<html lang="en">
<head>

  <!-- PayPal SDK -->

  <!-- Supabase -->

<body>

<h1>Project Zero 🚀</h1>
<p>Start from $0</p>

<input type="email" id="email" placeholder="Enter your email" />
<button onclick="saveEmail()">Get Access</button>

<div id="paypal-button-container"></div>

<script>
// ─── CONFIG ─────────────────────────────
const CONFIG = {
  SUPABASE_URL: 'https://guorftfyxkvjjcnwbuqj.supabase.co',
  SUPABASE_ANON_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd1b3JmdGZ5eGt2ampjbndidXFqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNzEwMDgsImV4cCI6MjA5MDc0NzAwOH0.0tGArgmPFkCF8kKeATu1Zpj2S4XDex4JEMa78wFCZjA',
  PAYPAL_CLIENT_ID: 'ARCmh_jIGYwiTJFP4EXo-XGqaatvoKiyCZgOMqgsCAd23s5U_-L5FwVPl9cYE6U3AQv2CYgTiOtxlQEk',
  PAYPAL_AMOUNT: '47.00',
  PAYPAL_CURRENCY: 'USD',
  PRIVATE_APP_URL: 'https://project-start-zero.lovable.app/',
  NOTION_PROXY_URL: 'https://project-zeroo.netlify.app/.netlify/functions/notion',
};

const supabase = window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);

// ─── SAVE EMAIL ─────────────────────────
async function saveEmail() {
  const email = document.getElementById('email').value;

  if (!email) return alert('Enter email');

  localStorage.setItem('user_email', email);

  await supabase.from('leads').insert([{ email, status: 'new' }]);

  alert('Email saved! Now complete payment.');
}

// ─── PAYPAL ─────────────────────────────
paypal.Buttons({
  createOrder: function(data, actions) {
    return actions.order.create({
      purchase_units: [{
        amount: {
          value: CONFIG.PAYPAL_AMOUNT
        }
      }]
    });
  },

  onApprove: async function(data, actions) {
    const details = await actions.order.capture();
    const email = localStorage.getItem('user_email');

    await supabase.from('purchases').insert([{
      email,
      transaction_id: details.id,
      amount: CONFIG.PAYPAL_AMOUNT,
      currency: CONFIG.PAYPAL_CURRENCY,
      status: 'completed'
    }]);

    window.location.href = CONFIG.PRIVATE_APP_URL;
  }
}).render('#paypal-button-container');
</script>

</body>
</html>
