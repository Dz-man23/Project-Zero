<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard</title>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div id="app" style="display:none;">
  <h1>Welcome to your dashboard 🚀</h1>
  <p>Your content goes here.</p>
</div>

<script>
// ─── CONFIG ─────────────────────────────
const SUPABASE_URL = 'https://guorftfyxkvjjcnwbuqj.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd1b3JmdGZ5eGt2ampjbndidXFqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNzEwMDgsImV4cCI6MjA5MDc0NzAwOH0.0tGArgmPFkCF8kKeATu1Zpj2S4XDex4JEMa78wFCZjA';
const NOTION_PROXY = 'https://project-zeroo.netlify.app/.netlify/functions/notion';

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ─── ACCESS CONTROL ─────────────────────
async function checkAccess() {
  const email = localStorage.getItem('user_email');

  if (!email) return blockAccess();

  const { data, error } = await supabase
    .from('purchases')
    .select('*')
    .eq('email', email)
    .eq('status', 'completed');

  if (error || !data || data.length === 0) {
    blockAccess();
  } else {
    allowAccess();
  }
}

function blockAccess() {
  document.body.innerHTML = `
    <div style="text-align:center;padding:60px;font-family:sans-serif;">
      <h1>🔒 Access Denied</h1>
      <p>You must purchase to access this dashboard.</p>
      <a href="/">Go back</a>
    </div>
  `;
}

function allowAccess() {
  document.getElementById('app').style.display = 'block';
}

checkAccess();
</script>

</body>
</html>
